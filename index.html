<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Target - Login e Cadastro</title>
    <style>
        :root {
            --navy: #1A365D;
            --azure: #3B82F6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, var(--azure) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: var(--navy);
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .logo {
            margin-bottom: 1.5rem;
        }

        .logo-svg {
            width: 90px;
            height: 90px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 2rem;
        }

        .forms-container {
            position: relative;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--navy);
        }

        .form input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form input:focus {
            outline: none;
            border-color: var(--azure);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .form button[type="submit"] {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--azure), #2563eb);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .form button[type="submit"]:hover {
            transform: translateY(-2px);
        }

        .toggle-text {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #64748b;
        }

        .toggle-link {
            color: var(--azure);
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }

            .logo-svg {
                width: 70px;
                height: 70px;
            }

            .title {
                font-size: 1.6rem;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Target circles -->
                <circle cx="50" cy="50" r="45" fill="none" stroke="#3B82F6" stroke-width="3"/>
                <circle cx="50" cy="50" r="32" fill="none" stroke="#1A365D" stroke-width="3"/>
                <circle cx="50" cy="50" r="18" fill="#3B82F6" stroke="#1A365D" stroke-width="2"/>
                <!-- Clock hands -->
                <line x1="50" y1="50" x2="55" y2="25" stroke="#1A365D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="50" y1="50" x2="80" y2="40" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Center dot -->
                <circle cx="50" cy="50" r="4" fill="#1A365D"/>
            </svg>
        </div>
        <h1 class="title">PPT Target</h1>
        <div class="forms-container">
            <form id="loginForm" class="form active">
                <h2>Login</h2>
                <input id="loginEmail" type="email" placeholder="Email" required>
                <input id="loginPassword" type="password" placeholder="Senha" required minlength="6">
                <button type="submit">Entrar</button>
                <p class="toggle-text">Não tem uma conta? <a href="#" class="toggle-link" data-toggle="signup">Cadastre-se</a></p>
            </form>
            <form id="signupForm" class="form">
                <h2>Cadastro</h2>
                <input id="signupEmail" type="email" placeholder="Email" required>
                <input id="signupPassword" type="password" placeholder="Senha" required minlength="6">
                <input id="signupConfirmPassword" type="password" placeholder="Confirme a senha" required minlength="6">
                <button type="submit">Cadastrar</button>
                <p class="toggle-text">Já tem uma conta? <a href="#" class="toggle-link" data-toggle="login">Faça login</a></p>
            </form>
        </div>
    </div>
</body>
</html>
